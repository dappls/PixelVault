<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault</title>
    <meta name="title" content="PixelVault">
    <meta name="description" content="Play unblocked games like Crazy Cattle 3D and Drive Mad on PixelVault. Fast, free, no downloads.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dappls.github.io/">
    <meta property="og:title" content="PixelVault">
    <meta property="og:description" content="Play unblocked games like Crazy Cattle 3D and Drive Mad on PixelVault. Fast, free, no downloads.">
    <meta name="google-adsense-account" content="ca-pub-3633320799834823">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NEGSCDQJH1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-NEGSCDQJH1');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3633320799834823" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="dark-mode">
    <header>
        <div class="header-content">
            <a class="logo" href="/" style="text-decoration: none; color: inherit;">PixelVault</a>
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
                <select id="sortOptions" onchange="sortZones()">
                    <option value="name">Name</option>
                    <option value="id">Date</option>
                    <option value="popular">Popular</option>
                </select>
            </div>
            <div class="control-buttons">
                <button id="settings">Settings</button>
            </div>
        </div>
    </header>

    <main>
        <details id="featuredZonesWrapper" open>
            <summary id="allZonesSummary">Featured</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>
        <br><hr><br>
        <details id="allZonesWrapper" open>
            <summary id="allSummary">All Games</summary>
            <div id="container">Loading...</div>
        </details>
    </main>

    <div id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Title</h3>
                <button id="popupClose" onclick="closePopup()">×</button>
            </div>
            <div id="popupBody"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="showContact(); return false;">Contact</a>
            <a href="#" onclick="loadPrivacy(); return false;">Privacy Policy</a>
            <a href="javascript:saveData()">Export Data</a>
            <label for="importData">Import Data</label>
            <input type="file" id="importData" style="display: none;" onchange="loadData(event)">
        </div>
    </footer>

    <script src="javascript/index.js"></script>
</body>
</html>
